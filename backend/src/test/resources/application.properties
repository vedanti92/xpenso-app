# ?? Override MySQL with H2 in-memory DB ??????????????????????????
spring.datasource.url=jdbc:h2:mem:xpenso_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? JPA ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# ?? JWT (must be 32+ chars) ???????????????????????????????????????
jwt.secret=xpenso-test-secret-key-for-junit-only

# ?? Brevo (dummy ? no real emails during tests) ???????????????????
brevo.api.key=test-key
brevo.from.email=test@xpenso.com
brevo.from.name=Xpenso Test

# ?? App URLs ?????????????????????????????????????????????????????
app.activation.url=http://localhost:8080
app.return.activation.link=true
xpenso.frontend.url=http://localhost:3000

# ?? Override active profile (don't use prod during tests) ?????????
spring.profiles.active=test